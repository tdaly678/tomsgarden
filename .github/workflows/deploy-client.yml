name: Deploy client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and required permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # VITE_BASE must match the GitHub Pages path: /<repo>/.
      # Defaults to /tomsgarden/ via vite.config.ts; override here if renamed.
      - name: Build client
        run: npm run build
        env:
          VITE_BASE: /tomsgarden/
      - name: Add SPA 404 fallback
        run: cp client/dist/index.html client/dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
